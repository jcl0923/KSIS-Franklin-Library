
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>閱讀 — 富蘭克林圖書館 KSIS</title>
<style>
:root{
  --navy:#1a2744;--gold:#c9a84c;--gold-lt:#e4c46e;
  --cream:#f5f0e8;--cream-dim:rgba(245,240,232,.65);--cream-low:rgba(245,240,232,.38);
  --border:rgba(201,168,76,.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:Georgia,'Times New Roman',serif;
  background:var(--navy);color:var(--cream);}

/* ── Top bar ─────────────── */
.topbar{
  height:54px;
  background:rgba(15,23,50,.97);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 20px;
  flex-shrink:0;
}
.btn-back{
  display:flex;align-items:center;gap:6px;
  background:transparent;border:1px solid var(--border);
  color:var(--gold);padding:6px 14px;border-radius:3px;
  cursor:pointer;font:inherit;font-size:.82rem;letter-spacing:.05em;
  text-decoration:none;transition:border-color .2s,background .2s;white-space:nowrap;
}
.btn-back:hover{border-color:var(--gold);background:rgba(201,168,76,.1);}
.sep{width:1px;height:26px;background:var(--border);flex-shrink:0;}
.book-title{
  flex:1;font-size:.92rem;color:var(--cream);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.book-author{font-size:.78rem;color:var(--gold);white-space:nowrap;margin-right:4px;}

.hd-logo{width:32px;height:32px;object-fit:contain;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.5));flex-shrink:0;}
.lib-name{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);white-space:nowrap;flex-shrink:0;}

.btn-newtab{
  display:flex;align-items:center;gap:5px;
  background:transparent;border:1px solid var(--border);
  color:var(--cream-low);padding:5px 12px;border-radius:3px;
  cursor:pointer;font:inherit;font-size:.76rem;letter-spacing:.04em;
  text-decoration:none;transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.btn-newtab:hover{border-color:var(--gold);color:var(--gold);}

.lang-toggle{display:flex;border:1px solid var(--gold);border-radius:4px;overflow:hidden;flex-shrink:0;}
.lang-toggle button{background:transparent;color:var(--gold);border:none;padding:4px 10px;
  cursor:pointer;font:inherit;font-size:.76rem;transition:background .2s,color .2s;}
.lang-toggle button.active{background:var(--gold);color:var(--navy);font-weight:bold;}
.lang-toggle button:hover:not(.active){background:rgba(201,168,76,.15);}

@media(max-width:600px){
  .lib-name,.book-author,.sep:not(:first-of-type){display:none;}
  .topbar{padding:0 12px;gap:8px;}
}

/* ── Frame area ──────────── */
.frame-wrap{
  width:100%;
  height:calc(100vh - 54px);
  position:relative;
  background:#fff;
}
#reader-frame{
  width:100%;height:100%;border:none;display:block;
  background:#fff;
}

/* Loading overlay */
.overlay{
  position:absolute;inset:0;
  background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:10;transition:opacity .4s;
}
.overlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.overlay p{font-size:.9rem;color:var(--cream-dim);}

/* Error state */
.error-box{
  position:absolute;inset:0;background:var(--navy);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:20;text-align:center;padding:40px;
}
.error-box.show{display:flex;}
.error-icon{font-size:3rem;}
.error-box h3{font-size:1.2rem;font-weight:400;color:var(--cream);}
.error-box p{font-size:.9rem;color:var(--cream-dim);max-width:460px;line-height:1.7;}
.error-box .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.error-box a,.error-box button{
  padding:11px 24px;border-radius:3px;font:inherit;font-size:.88rem;
  letter-spacing:.08em;cursor:pointer;text-decoration:none;
}
.btn-primary-e{background:var(--gold);color:var(--navy);border:none;}
.btn-primary-e:hover{background:var(--gold-lt);}
.btn-secondary-e{background:transparent;border:1px solid var(--gold);color:var(--gold);}
.btn-secondary-e:hover{background:rgba(201,168,76,.1);}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <a class="btn-back" id="back-btn" href="catalog.html">
    ← <span data-zh="返回書庫" data-en="Back">返回書庫</span>
  </a>
  <div class="sep"></div>
  <img class="hd-logo"
       src="ksis-seal.png"
       alt="KSIS" onerror="this.style.display='none'">
  <img src="ib-logo.png" alt="IB" style="width:24px;height:auto;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));" onerror="this.style.display='none'">
  <span class="lib-name" data-zh="富蘭克林圖書館" data-en="Franklin Library">富蘭克林圖書館</span>
  <div class="sep"></div>
  <span class="book-author" id="bar-author"></span>
  <span class="book-title" id="bar-title">載入中…</span>
  <a class="btn-newtab" id="newtab-btn" href="#" target="_blank">
    ↗ <span data-zh="新分頁開啟" data-en="New Tab">新分頁開啟</span>
  </a>
  <div class="lang-toggle">
    <button id="btn-zh" class="active" onclick="setLang('zh')">中文</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- Frame area -->
<div class="frame-wrap">
  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <p id="load-msg">正在開啟書本…</p>
  </div>

  <div class="error-box" id="error-box">
    <div class="error-icon">📖</div>
    <h3 id="err-title">無法在頁面內載入此書</h3>
    <p id="err-desc">此書的來源不允許內嵌顯示。請點選下方按鈕在新分頁閱讀，或返回書庫選擇其他書籍。</p>
    <div class="actions">
      <a class="btn-primary-e" id="err-read-btn" href="#" target="_blank">在新分頁閱讀</a>
      <a class="btn-secondary-e" href="catalog.html">返回書庫</a>
    </div>
  </div>

  <iframe id="reader-frame" title="Book Reader" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
let lang = localStorage.getItem('ksisLang') || 'zh';

window.addEventListener('DOMContentLoaded', () => {
  applyLang(lang);

  const p   = new URLSearchParams(location.search);
  const ia  = p.get('ia') || '';
  const id  = p.get('id') || '';
  const title  = p.get('t') || (lang==='zh'?'閱讀':'Reading');
  const author = p.get('a') || '';

  document.getElementById('bar-title').textContent  = title;
  document.getElementById('bar-author').textContent = author ? author + ' ·' : '';
  document.title = title + ' — 富蘭克林圖書館';

  // Build the back link (to book detail)
  const backParams = new URLSearchParams({id, t:title, a:author, c:p.get('c')||'', ia, y:p.get('y')||''});
  document.getElementById('back-btn').href = `book.html?${backParams}`;

  // Determine read URL
  let readUrl = '';
  if(ia){
    // Internet Archive embed URL — designed for iframe use
    readUrl = `https://archive.org/embed/${ia}?ui=embed`;
  } else if(id){
    // Open Library read page
    readUrl = `https://openlibrary.org/works/${id}`;
  }

  document.getElementById('newtab-btn').href = readUrl || '#';
  document.getElementById('err-read-btn').href = readUrl || '#';

  if(!readUrl){
    showError();
    return;
  }

  const frame = document.getElementById('reader-frame');

  // Timeout — if frame doesn't load in 12s, show error
  let timer = setTimeout(()=>{ showError(); }, 12000);

  frame.addEventListener('load', ()=>{
    clearTimeout(timer);
    // Check if frame content is accessible (same-origin) or just loaded
    // For cross-origin we can't check content, assume success after load event
    hideOverlay();
  });

  frame.addEventListener('error', ()=>{
    clearTimeout(timer);
    showError();
  });

  // Small delay before setting src to let page render first
  setTimeout(()=>{ frame.src = readUrl; }, 300);
});

function hideOverlay(){
  document.getElementById('overlay').classList.add('hidden');
}

function showError(){
  document.getElementById('overlay').classList.add('hidden');
  const eb = document.getElementById('error-box');
  eb.classList.add('show');
  if(lang==='en'){
    document.getElementById('err-title').textContent = 'Cannot display this book inline';
    document.getElementById('err-desc').textContent  = "This book's source doesn't allow embedded display. Click below to read in a new tab, or go back to the catalog.";
    document.getElementById('err-read-btn').textContent = 'Read in New Tab';
    document.querySelector('.btn-secondary-e').textContent = 'Back to Catalog';
  }
}

function setLang(l){
  lang = l;
  localStorage.setItem('ksisLang', l);
  applyLang(l);
}

function applyLang(l){
  document.getElementById('btn-zh').classList.toggle('active', l==='zh');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.documentElement.lang = l==='zh'?'zh-TW':'en';
  document.querySelectorAll('[data-zh]').forEach(el=>{
    el.textContent = l==='zh' ? el.dataset.zh : el.dataset.en;
  });
  document.getElementById('load-msg').textContent = l==='zh' ? '正在開啟書本…' : 'Opening book…';
}
</script>
</body>
</html>
