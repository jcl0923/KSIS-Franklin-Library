<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書本詳情 — 富蘭克林圖書館 KSIS</title>
<style>
:root{
  --navy:#1a2744;--navy-mid:#243360;
  --gold:#c9a84c;--gold-lt:#e4c46e;
  --cream:#f5f0e8;--cream-dim:rgba(245,240,232,.65);--cream-low:rgba(245,240,232,.38);
  --border:rgba(201,168,76,.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:Georgia,'Times New Roman',serif;background:var(--navy);color:var(--cream);min-height:100vh;}
a{color:inherit;text-decoration:none;}

.page-bg{position:fixed;inset:0;z-index:0;
  background:linear-gradient(165deg,#0c1628 0%,var(--navy) 45%,#1c3262 100%);}
.page-bg::after{content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 48px,rgba(201,168,76,.03) 48px,rgba(201,168,76,.03) 49px),
    repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(201,168,76,.03) 48px,rgba(201,168,76,.03) 49px);}

/* Header */
header{position:sticky;top:0;z-index:50;
  background:rgba(15,23,50,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:0 40px;
  display:flex;align-items:center;gap:20px;height:70px;}
.hd-logo{width:42px;height:42px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5));}
.hd-name{flex:1;}
.hd-name-zh{font-size:1.05rem;color:var(--cream);line-height:1.2;}
.hd-name-en{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);}
nav{display:flex;gap:24px;align-items:center;}
nav a{font-size:.84rem;letter-spacing:.06em;color:var(--cream-dim);transition:color .2s;}
nav a:hover,nav a.active{color:var(--gold);}
.hd-sep{width:1px;height:28px;background:var(--border);}
.user-info{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--cream-dim);}
.user-name{color:var(--gold-lt);}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--cream-dim);
  padding:5px 12px;border-radius:3px;cursor:pointer;font:inherit;font-size:.78rem;letter-spacing:.06em;
  transition:border-color .2s,color .2s;}
.btn-out:hover{border-color:var(--gold);color:var(--gold);}
.lang-toggle{display:flex;border:1px solid var(--gold);border-radius:4px;overflow:hidden;flex-shrink:0;}
.lang-toggle button{background:transparent;color:var(--gold);border:none;padding:5px 11px;
  cursor:pointer;font:inherit;font-size:.8rem;transition:background .2s,color .2s;}
.lang-toggle button.active{background:var(--gold);color:var(--navy);font-weight:bold;}
.lang-toggle button:hover:not(.active){background:rgba(201,168,76,.15);}
@media(max-width:768px){header{padding:0 16px;gap:10px;}nav{display:none;}.hd-sep{display:none;}}

/* Breadcrumb */
.breadcrumb{position:relative;z-index:1;padding:16px 40px;font-size:.8rem;color:var(--cream-low);}
.breadcrumb a{color:var(--gold);transition:opacity .2s;}
.breadcrumb a:hover{opacity:.75;}
.breadcrumb span{margin:0 8px;}
@media(max-width:768px){.breadcrumb{padding:12px 16px;}}

/* Loading/Error */
.loading,.error{text-align:center;padding:100px 20px;color:var(--cream-dim);position:relative;z-index:1;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Main detail */
.book-detail{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 40px 60px;}
@media(max-width:768px){.book-detail{padding:0 16px 40px;}}

.detail-grid{display:grid;grid-template-columns:220px 1fr;gap:48px;align-items:start;}
@media(max-width:720px){.detail-grid{grid-template-columns:1fr;gap:24px;}}

/* Cover */
.detail-cover{position:sticky;top:90px;}
.cover-img{width:100%;aspect-ratio:2/3;object-fit:cover;border:3px solid var(--gold);
  box-shadow:0 12px 40px rgba(0,0,0,.6);display:block;}
.cover-no{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#0c1628,var(--navy-mid));
  border:3px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;font-size:3rem;color:var(--gold);}
.cover-no span{font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;color:var(--cream-dim);}
@media(max-width:720px){.detail-cover{position:static;max-width:200px;margin:0 auto;}}

/* Info */
.detail-info{}
.d-label{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.d-title{font-size:2rem;font-weight:400;line-height:1.25;color:var(--cream);margin-bottom:8px;}
.d-author{font-size:1.1rem;color:var(--gold-lt);margin-bottom:20px;}
.d-divider{width:40px;height:2px;background:linear-gradient(to right,var(--gold),transparent);margin:18px 0;}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;}
@media(max-width:480px){.meta-grid{grid-template-columns:1fr;}}
.meta-item{}
.meta-key{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
.meta-val{font-size:.88rem;color:var(--cream-dim);line-height:1.5;}

/* Subjects */
.subjects{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
.subject-tag{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);
  color:var(--cream-dim);padding:4px 12px;border-radius:20px;font-size:.74rem;letter-spacing:.04em;}

/* Action buttons */
.actions{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:32px;}
.btn-primary{padding:13px 28px;background:var(--gold);color:var(--navy);border:none;border-radius:3px;
  cursor:pointer;font:inherit;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;
  transition:background .2s;display:inline-block;text-align:center;}
.btn-primary:hover{background:var(--gold-lt);}
.btn-secondary{padding:13px 24px;background:transparent;color:var(--gold);border:1px solid var(--gold);
  border-radius:3px;cursor:pointer;font:inherit;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase;
  transition:all .2s;display:inline-block;text-align:center;}
.btn-secondary:hover{background:rgba(201,168,76,.1);}

/* Description */
.desc-section{border-top:1px solid var(--border);padding-top:24px;}
.desc-title{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.desc-text{font-size:.9rem;color:var(--cream-dim);line-height:1.8;}

/* Related */
.related-section{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 40px 60px;}
@media(max-width:768px){.related-section{padding:0 16px 40px;}}
.section-head{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
.section-head h3{font-size:1rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:400;}
.section-head::after{content:'';flex:1;height:1px;background:var(--border);}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:20px;}
.rel-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;
  overflow:hidden;cursor:pointer;transition:transform .2s,background .2s;}
.rel-card:hover{transform:translateY(-3px);background:rgba(255,255,255,.09);}
.rel-cover{width:100%;aspect-ratio:2/3;overflow:hidden;background:#0c1628;}
.rel-cover img{width:100%;height:100%;object-fit:cover;}
.rel-cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;}
.rel-body{padding:10px;}
.rel-title{font-size:.76rem;color:var(--cream);line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;}
.rel-author{font-size:.68rem;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Footer */
footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:28px 40px;
  display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between;background:rgba(0,0,0,.2);
  font-size:.78rem;color:var(--cream-low);}
footer a{color:var(--gold);}
@media(max-width:768px){footer{padding:20px 16px;}}
</style>
</head>
<body>

<div class="page-bg"></div>

<header>
  <img class="hd-logo"
       src="ksis-seal.png"
       alt="KSIS" onerror="this.style.display='none'">
  <div class="hd-name">
    <div class="hd-name-zh">富蘭克林圖書館</div>
    <div class="hd-name-en">Franklin Digital Library — KSIS</div>
  </div>
  <nav>
    <a href="catalog.html" data-zh="書庫" data-en="Catalog">書庫</a>
    <a href="about.html" data-zh="關於" data-en="About">關於</a>
    <a href="https://www.ksis.tn.edu.tw" target="_blank" data-zh="學校" data-en="School">學校</a>
  </nav>
  <div class="hd-sep"></div>
  <div class="user-info">
    <span class="user-name" id="uname">—</span>
    <button class="btn-out" onclick="logout()" data-zh="登出" data-en="Sign Out">登出</button>
  </div>
  <div class="lang-toggle">
    <button id="btn-zh" class="active" onclick="setLang('zh')">中文</button>
    <button id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="breadcrumb">
  <a href="catalog.html" data-zh="書庫" data-en="Catalog">書庫</a>
  <span>›</span>
  <span id="bc-title">…</span>
</div>

<div id="main-area">
  <div class="loading">
    <div class="spinner"></div>
    <div id="load-text">載入中…</div>
  </div>
</div>

<script>
let lang = localStorage.getItem('ksisLang') || 'zh';

window.addEventListener('DOMContentLoaded', async ()=>{
  const u = sessionStorage.getItem('ksisUser');
  document.getElementById('uname').textContent = u||'—';
  applyLang(lang);

  const p = new URLSearchParams(location.search);
  const id    = p.get('id');
  const title = p.get('t') || 'Untitled';
  const author= p.get('a') || '';
  const covId = p.get('c') || '';
  const ia    = p.get('ia') || '';
  const year  = p.get('y') || '';

  if(!id){ showError(lang==='zh'?'找不到此書':'Book not found'); return; }

  document.getElementById('bc-title').textContent = title;

  // Render immediately with URL param data
  renderDetail({id, title, author, covId, ia, year, subjects:[], description:''});

  // Then fetch richer data from Open Library
  try{
    const res = await fetch(`https://openlibrary.org/works/${id}.json`);
    if(res.ok){
      const data = await res.json();
      const desc = typeof data.description === 'object'
        ? data.description.value
        : (data.description || '');
      const subjects = data.subjects || [];
      enrichDetail({desc, subjects});
    }
  }catch(e){}

  loadRelated({title, author, id});
});

function setLang(l){
  lang=l;
  localStorage.setItem('ksisLang',l);
  applyLang(l);
}
function applyLang(l){
  document.getElementById('btn-zh').classList.toggle('active',l==='zh');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.documentElement.lang=l==='zh'?'zh-TW':'en';
  document.querySelectorAll('[data-zh]').forEach(el=>{
    el.textContent=l==='zh'?el.dataset.zh:el.dataset.en;
  });
}

function renderDetail(b){
  const cover = b.covId
    ? `https://covers.openlibrary.org/b/id/${b.covId}-L.jpg`
    : '';
  // Build reader URL (stays within library site)
  const readerParams = new URLSearchParams({
    id: b.id, t: b.title, a: b.author,
    c: b.covId, ia: b.ia, y: b.year
  });
  const readUrl = `reader.html?${readerParams}`;

  const coverHtml = cover
    ? `<img class="cover-img" src="${cover}" alt="${b.title.replace(/"/g,'')}"
           onerror="this.outerHTML='<div class=cover-no>📖<span>📚</span></div>'">`
    : `<div class="cover-no">📖<span>${lang==='zh'?'暫無封面':'No Cover'}</span></div>`;

  const metaItems = [
    {k:lang==='zh'?'作者':'Author',   v: b.author || (lang==='zh'?'佚名':'Unknown')},
    {k:lang==='zh'?'出版年份':'Year', v: b.year || '—'},
    {k:lang==='zh'?'書庫':'Library',  v: 'Open Library'},
    {k:lang==='zh'?'編號':'Work ID',  v: b.id},
  ];

  const html = `
  <div class="book-detail">
    <div class="detail-grid">
      <div class="detail-cover">${coverHtml}</div>
      <div class="detail-info">
        <div class="d-label">${lang==='zh'?'書名':'Title'}</div>
        <h1 class="d-title">${b.title}</h1>
        <div class="d-author">${b.author}</div>
        <div class="d-divider"></div>
        <div class="meta-grid">
          ${metaItems.map(m=>`<div class="meta-item">
            <div class="meta-key">${m.k}</div>
            <div class="meta-val">${m.v}</div>
          </div>`).join('')}
        </div>
        <div class="subjects" id="subject-tags"></div>
        <div class="actions">
          <a href="${readUrl}" class="btn-primary">
            ${lang==='zh'?'📖 線上閱讀':'📖 Read Online'}
          </a>
          <a href="https://openlibrary.org/works/${b.id}" target="_blank" class="btn-secondary">
            ${lang==='zh'?'在 Open Library 查看':'View on Open Library'}
          </a>
        </div>
        <div class="desc-section">
          <div class="desc-title">${lang==='zh'?'關於本書':'About This Book'}</div>
          <p class="desc-text" id="book-desc">${lang==='zh'?'載入中…':'Loading…'}</p>
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('main-area').innerHTML = html;
}

function enrichDetail({desc, subjects}){
  // Update description
  const descEl = document.getElementById('book-desc');
  if(descEl){
    descEl.textContent = desc ||
      (lang==='zh'?'本書收錄於 Open Library 免費電子書庫，可線上閱讀或借閱。':'This book is available in the Open Library free e-book collection.');
  }
  // Add subject tags
  const tagsEl = document.getElementById('subject-tags');
  if(tagsEl && subjects.length){
    tagsEl.innerHTML = subjects.slice(0,10).map(s=>`<span class="subject-tag">${s}</span>`).join('');
  }
}

async function loadRelated(b){
  const query = b.author || b.title || 'classic';
  try{
    const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=7&fields=key,title,author_name,cover_i,ia`);
    const data = await res.json();
    const others = (data.docs||[]).filter(r=>r.key!==`/works/${b.id}`).slice(0,6);
    if(!others.length) return;

    const section = document.createElement('div');
    section.className='related-section';
    section.innerHTML=`
      <div class="section-head">
        <h3 data-zh="相關書籍" data-en="Related Books">${lang==='zh'?'相關書籍':'Related Books'}</h3>
      </div>
      <div class="rel-grid">
        ${others.map(rb=>{
          const rc = rb.cover_i ? `https://covers.openlibrary.org/b/id/${rb.cover_i}-M.jpg` : '';
          const ra = (rb.author_name||[])[0]||'';
          const rt = (rb.title||'').length>40?(rb.title).substring(0,40)+'…':rb.title;
          const rp = new URLSearchParams({id:(rb.key||'').replace('/works/',''),t:rb.title||'',a:ra,c:rb.cover_i||'',ia:(rb.ia||[])[0]||''});
          return `<div class="rel-card" onclick="location.href='book.html?${rp}'">
            <div class="rel-cover">
              ${rc ? `<img src="${rc}" alt="${rt}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=rel-cover-ph>📖</div>'>` : '<div class="rel-cover-ph">📖</div>'}
            </div>
            <div class="rel-body">
              <div class="rel-title">${rt}</div>
              <div class="rel-author">${ra}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    document.querySelector('.book-detail')?.after(section);
  }catch(e){}

  // add footer
  const ft = document.createElement('footer');
  ft.innerHTML=`<span>© 崑山國際學校 富蘭克林圖書館</span>
    <span><a href="catalog.html" data-zh="返回書庫" data-en="Back to Catalog">${lang==='zh'?'返回書庫':'Back to Catalog'}</a></span>
    <span>Powered by <a href="https://www.gutenberg.org" target="_blank">Project Gutenberg</a></span>`;
  document.body.appendChild(ft);
}

function showError(msg){
  document.getElementById('main-area').innerHTML=
    `<div class="error"><p style="font-size:1.1rem;margin-bottom:16px;">${msg}</p>
     <a href="catalog.html" style="color:var(--gold)">← ${lang==='zh'?'返回書庫':'Back to Catalog'}</a></div>`;
}

function formatAuthor(name){
  if(name.includes(',')){const p=name.split(',');return(p[1]?.trim()||'')+' '+p[0].trim();}
  return name;
}

function logout(){
  sessionStorage.clear();
  window.location.href='index.html';
}
</script>
</body>
</html>
